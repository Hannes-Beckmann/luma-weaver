name: Publish add-on images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-platform:
    name: Publish ${{ matrix.arch }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine add-on version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(awk -F'\"' '/^version: / { print $2; exit }' config.yaml)"
          fi

          config_version="$(awk -F'\"' '/^version: / { print $2; exit }' config.yaml)"

          if [[ -z "${version}" || -z "${config_version}" ]]; then
            echo "Unable to determine add-on version" >&2
            exit 1
          fi

          if [[ "${version}" != "${config_version}" ]]; then
            echo "Tag version (${version}) does not match config.yaml version (${config_version})" >&2
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Determine image namespace
        id: image
        shell: bash
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Determine temporary tag
        id: temp
        shell: bash
        run: echo "tag=ghcr.io/${{ steps.image.outputs.owner }}/luma-weaver-addon:${{ steps.version.outputs.value }}-${{ matrix.arch }}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ${{ steps.temp.outputs.tag }}

  publish-manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: publish-platform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine add-on version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(awk -F'\"' '/^version: / { print $2; exit }' config.yaml)"
          fi

          config_version="$(awk -F'\"' '/^version: / { print $2; exit }' config.yaml)"

          if [[ -z "${version}" || -z "${config_version}" ]]; then
            echo "Unable to determine add-on version" >&2
            exit 1
          fi

          if [[ "${version}" != "${config_version}" ]]; then
            echo "Tag version (${version}) does not match config.yaml version (${config_version})" >&2
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Determine image namespace
        id: image
        shell: bash
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        shell: bash
        run: |
          amd64_image="ghcr.io/${{ steps.image.outputs.owner }}/luma-weaver-addon:${{ steps.version.outputs.value }}-amd64"
          arm64_image="ghcr.io/${{ steps.image.outputs.owner }}/luma-weaver-addon:${{ steps.version.outputs.value }}-aarch64"
          final_image="ghcr.io/${{ steps.image.outputs.owner }}/luma-weaver-addon:${{ steps.version.outputs.value }}"
          latest_image="ghcr.io/${{ steps.image.outputs.owner }}/luma-weaver-addon:latest"

          docker buildx imagetools create \
            --tag "${final_image}" \
            --tag "${latest_image}" \
            "${amd64_image}" \
            "${arm64_image}"

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: publish-manifest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
