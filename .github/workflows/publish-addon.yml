name: Publish add-on images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
          - arch: armv7
            platform: linux/arm/v7
            build_from: ghcr.io/home-assistant/armv7-base-debian:bookworm
          - arch: armhf
            platform: linux/arm/v6
            build_from: ghcr.io/home-assistant/armhf-base-debian:bookworm
          - arch: i386
            platform: linux/386
            build_from: ghcr.io/home-assistant/i386-base-debian:bookworm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine add-on version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(awk -F'"' '/^version: / { print $2; exit }' config.yaml)"
          fi

          config_version="$(awk -F'"' '/^version: / { print $2; exit }' config.yaml)"

          if [[ -z "${version}" || -z "${config_version}" ]]; then
            echo "Unable to determine add-on version" >&2
            exit 1
          fi

          if [[ "${version}" != "${config_version}" ]]; then
            echo "Tag version (${version}) does not match config.yaml version (${config_version})" >&2
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Determine image namespace
        id: image
        shell: bash
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/${{ matrix.arch }}-addon-luma_weaver:${{ steps.version.outputs.value }}
            ghcr.io/${{ steps.image.outputs.owner }}/${{ matrix.arch }}-addon-luma_weaver:latest
