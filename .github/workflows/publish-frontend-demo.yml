name: Publish frontend demo to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend demo
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Rust toolchain with wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: taiki-e/install-action@trunk

      - name: Determine Pages public URL
        id: public-url
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${repo_name}" == "${owner_name}.github.io" ]]; then
            public_url="/"
          else
            public_url="/${repo_name}/"
          fi

          echo "value=${public_url}" >> "${GITHUB_OUTPUT}"

      - name: Build frontend demo
        working-directory: crates/frontend
        run: trunk build --release --features demo-mode --public-url "${{ steps.public-url.outputs.value }}"

      - name: Disable Jekyll processing
        shell: bash
        run: touch crates/frontend/dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/frontend/dist

  deploy:
    name: Deploy frontend demo
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
