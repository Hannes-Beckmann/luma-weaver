name: Publish GitHub Pages site

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Rust toolchain with wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: taiki-e/install-action@trunk

      - name: Install mdBook
        uses: taiki-e/install-action@mdbook

      - name: Install mdBook Mermaid
        uses: taiki-e/install-action@mdbook-mermaid

      - name: Determine Pages paths
        id: pages-paths
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${repo_name}" == "${owner_name}.github.io" ]]; then
            public_url="/"
            docs_site_url="/docs/"
          else
            public_url="/${repo_name}/"
            docs_site_url="/${repo_name}/docs/"
          fi

          echo "public_url=${public_url}" >> "${GITHUB_OUTPUT}"
          echo "docs_site_url=${docs_site_url}" >> "${GITHUB_OUTPUT}"

      - name: Build frontend preview
        working-directory: crates/frontend
        run: trunk build --release --features demo-mode --public-url "${{ steps.pages-paths.outputs.public_url }}"

      - name: Build mdBook docs
        shell: bash
        working-directory: docs-book
        run: mdbook build
        env:
          MDBOOK_OUTPUT__HTML__SITE_URL: ${{ steps.pages-paths.outputs.docs_site_url }}

      - name: Build Rust reference docs for backend and shared
        shell: bash
        run: cargo doc -p backend -p shared --no-deps --locked

      - name: Build Rust reference docs for frontend wasm target
        shell: bash
        run: cargo doc -p frontend --no-deps --locked --target wasm32-unknown-unknown

      - name: Assemble GitHub Pages artifact
        shell: bash
        run: |
          rm -rf site
          mkdir -p site/docs site/reference
          cp -R crates/frontend/dist/. site/
          cp -R docs-book/book/. site/docs/
          cp -R target/doc/. site/reference/
          cp -R target/wasm32-unknown-unknown/doc/frontend site/reference/frontend
          cp -R target/wasm32-unknown-unknown/doc/src site/reference/src
          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy Pages site
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
