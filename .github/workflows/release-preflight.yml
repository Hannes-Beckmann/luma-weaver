name: Release preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine add-on version
        id: version
        shell: bash
        run: |
          version="$(awk -F'\"' '/^version: / { print $2; exit }' config.yaml)"
          if [[ -z "${version}" ]]; then
            echo "Unable to determine add-on version" >&2
            exit 1
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Determine image namespace
        id: image
        shell: bash
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release image without pushing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ steps.version.outputs.value }}
